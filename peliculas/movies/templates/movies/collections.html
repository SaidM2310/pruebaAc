{% extends "movies/base.html" %}

{% block content %}

<div class="p-6">
    <h1 class="text-2xl text-white mb-4">My Collection</h1>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        {% for item in items %}
            <div>
                <img src="{{ item.movie.image.url }}" class="rounded">
                <h3 class="text-blue-400">{{ item.movie.title }}</h3>
            </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
